<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Strategic OKR Intelligence System — Ean Virtual 2.0</title>
  <meta name="description"
    content="Sistema de gestión y seguimiento estratégico OKR para el Modelo Ean Virtual 2.0. Dashboard ejecutivo multinivel con indicadores compuestos.">
  <link rel="stylesheet" href="styles.css">
  <script src="lib/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js?v=7"></script>
</head>

<body>

  <div id="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-mark">
          <div class="logo-icon">◈</div>
          <div>
            <div class="logo-text">Ean Virtual OKR</div>
            <div class="logo-sub">Intelligence System</div>
          </div>
        </div>
        <div class="logo-badge">Modelo 2.0 · 2026</div>
      </div>
      <nav class="sidebar-nav" id="sidebar-nav"></nav>
      <div class="sidebar-footer" id="sidebar-footer"></div>
    </aside>

    <!-- Main -->
    <div class="main-area">
      <header class="topbar">
        <div>
          <div class="topbar-title" id="topbar-title">Cargando…</div>
          <div class="topbar-sub" id="topbar-sub"></div>
        </div>
        <div class="topbar-spacer"></div>
        <div class="topbar-actions">
          <select id="okr-context-switcher" class="form-control"
            style="width: 200px; padding: 4px 8px; font-size: 12px; margin-right: 12px"
            onchange="AppState.activeOkrId = this.value; renderPage(AppState.currentPage)">
            <option value="all">Todos los OKRs (Global)</option>
          </select>
          <button class="btn btn-secondary btn-sm" onclick="exportData()" title="Descargar JSON">↓ Exportar</button>
          <label class="btn btn-secondary btn-sm" style="margin: 0; cursor: pointer" title="Cargar JSON">
            ↑ JSON <input type="file" id="import-file" style="display: none" accept=".json"
              onchange="importData(event)">
          </label>
          <label class="btn btn-secondary btn-sm" style="margin: 0; cursor: pointer" title="Cargar Excel">
            ↑ Excel <input type="file" id="import-excel-file" style="display: none" accept=".xlsx, .xls"
              onchange="importExcelData(event)">
          </label>
          <button class="btn btn-primary btn-sm" onclick="forceSaveData()" title="Guardar cambios localmente">💾
            Guardar</button>
          <button class="btn btn-secondary btn-sm" onclick="navigate('alerts')">⚑ Alertas</button>
          <button class="btn btn-primary btn-sm" onclick="openNewCheckin()">+ Check-in</button>
          <button class="btn btn-ghost btn-sm" title="Restablecer datos"
            onclick="if(confirm('¿Restablecer datos de demostración?')){DB.reset();init();showToast('Datos restablecidos','info')}">↺</button>
        </div>
      </header>
      <main class="page-content" id="page-content"></main>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <div class="modal-title" id="modal-title"></div>
        <button class="modal-close" onclick="Modal.close()">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div style="padding:0 26px 20px;display:flex;justify-content:flex-end;gap:10px" id="modal-actions"></div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast-container"></div>

  <!-- Single bundled script — avoids file:// multi-script loading issues -->
  <script src="bundle.js?v=8"></script>
</body>

</html>
