<!DOCTYPE html>

                    data.okrs[idx] = completeOKR;
                } else {
                    data.okrs.unshift(completeOKR);
                }

                // Save back
                localStorage.setItem(DB_KEY, JSON.stringify(data));

                // Count stats
                const pkrCount = completeOKR.projectKRs.length;
                const tkrCount = completeOKR.projectKRs.reduce((s, p) => s + p.tkrs.length, 0);
                const kaCount = completeOKR.projectKRs.reduce((s, p) => s + p.tkrs.reduce((ss, t) => ss + t.kas.length, 0), 0);

                statusEl.className = 'status success';
                statusEl.innerHTML = `✅ Datos inyectados exitosamente!<br><br>
        📊 <strong>${pkrCount} KRs Estratégicos</strong> | 
        🎯 <strong>${tkrCount} KRs Tácticos</strong> | 
        ⚡ <strong>${kaCount} Acciones Clave</strong><br><br>
        <em>Redirigiendo a la app en 2 segundos...</em>`;

                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 2000);

            } catch (e) {
                statusEl.className = 'status error';
                statusEl.textContent = '❌ Error: ' + e.message;
            }
        })();
    </script>
</body>

</html>
